server {
    listen 8080;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Hashed build assets are content-addressed (Vite emits filename hashes),
    # so they can be cached forever. Match BEFORE the SPA fallback location.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        try_files $uri =404;
    }

    # Other static assets at the root (favicon, og images, etc.)
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
    }

    # The SPA entrypoint must NEVER be long-cached: it references hashed JS
    # chunks that change on every deploy. If a stale index.html is served,
    # users get 404s on dynamic imports for the previous build's chunks.
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # SPA fallback — any unmatched path returns index.html with the no-cache
    # headers above (try_files preserves the matched location's headers).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Error pages
    error_page 503 502 504 /error.html;
    location = /error.html {
        internal;
    }
}
