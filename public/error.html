<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>lukout Portal - Taking a Brief Break</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: white;
      overflow: hidden;
      position: relative;
    }
    .container {
      text-align: center;
      padding: 3rem;
      max-width: 600px;
      z-index: 2;
    }
    .binoculars {
      font-size: 6rem;
      margin-bottom: 1rem;
      animation: bounce 2s ease-in-out infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }
    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      font-weight: 700;
      background: linear-gradient(90deg, #e94560, #ff6b6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    p {
      font-size: 1.1rem;
      opacity: 0.9;
      line-height: 1.6;
      margin-bottom: 0.5rem;
    }
    .status {
      font-size: 5rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      opacity: 0.3;
      letter-spacing: -0.05em;
    }
    .refresh-hint {
      margin-top: 2rem;
      padding: 1rem 2rem;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      display: inline-block;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .refresh-hint:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(1.05);
    }
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      z-index: 1;
    }
    .star {
      position: absolute;
      width: 2px;
      height: 2px;
      background: white;
      border-radius: 50%;
      animation: twinkle 3s ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="stars" id="stars"></div>
  <div class="container">
    <div class="binoculars">🔭</div>
    <div class="status">503</div>
    <h1>Taking a Brief Break</h1>
    <p>We're currently scanning the horizon and making improvements.</p>
    <p>The lukout Portal will be back shortly.</p>
    <div class="refresh-hint" onclick="location.reload()">
      🔄 Refresh Page
    </div>
  </div>
  <script>
    // Create twinkling stars
    const starsContainer = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random() * 100 + '%';
      star.style.top = Math.random() * 100 + '%';
      star.style.animationDelay = Math.random() * 3 + 's';
      starsContainer.appendChild(star);
    }
  </script>
</body>
</html>
